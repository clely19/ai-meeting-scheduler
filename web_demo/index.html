<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Meeting Scheduler Demo</title>
    <link rel="stylesheet" href="/demo/styles.css?v=20260629-focused-app">
  </head>
  <body>
    <main class="shell">
      <section class="phone" aria-label="Scheduling conversation demo">
        <section class="messages-list-screen" aria-label="Messages list">
          <div class="status-bar" aria-hidden="true">
            <span class="time-pill">8:11</span>
            <span class="system-icons">▮▮▮  Wi-Fi  ◖</span>
          </div>
          <header class="list-header">
            <button class="edit-button" type="button">Edit</button>
            <button id="filter-menu-button" class="filter-menu-button" type="button" aria-label="Open message filters" aria-expanded="false">
              <img src="/demo/assets/messages-filter-icon.png" alt="">
            </button>
          </header>
          <nav id="filter-menu" class="filter-menu" aria-label="Message filters" hidden>
            <button class="filter-menu-row active" type="button" data-filter-action="all">
              <span class="filter-mark">✓</span>
              <span>Messages</span>
            </button>
            <button class="filter-menu-row" type="button" data-filter-action="linkedin">
              <span class="filter-icon">in</span>
              <span>LinkedIn Posts</span>
            </button>
            <button class="filter-menu-row" type="button" data-filter-action="scheduler">
              <span class="filter-icon">AI</span>
              <span>Scheduler Demo</span>
            </button>
            <a class="filter-menu-row menu-separator" href="/docs" target="_blank" rel="noreferrer">
              <span class="filter-icon">API</span>
              <span>Open API Docs</span>
            </a>
            <a class="filter-menu-row" href="/health" target="_blank" rel="noreferrer">
              <span class="filter-icon">OK</span>
              <span>Backend Health</span>
            </a>
            <a class="filter-menu-row" href="https://github.com/clely19/ai-meeting-scheduler" target="_blank" rel="noreferrer">
              <span class="filter-icon">GH</span>
              <span>GitHub Repo</span>
            </a>
          </nav>
          <h1 class="messages-title">Messages</h1>
          <section class="conversation-list" aria-label="Recent conversations">
            <button id="open-demo-chat" class="conversation-row" type="button">
              <span class="conversation-avatar">M</span>
              <span class="conversation-copy">
                <span class="conversation-name">AI Meeting Scheduler Demo</span>
                <span class="conversation-preview">Create a chat, tap +, choose Meeting Scheduler.</span>
              </span>
              <span class="conversation-date">Now</span>
            </button>
            <button class="conversation-row linkedin-row" type="button" data-post-id="agentic-ai">
              <span class="conversation-avatar linkedin">in</span>
              <span class="conversation-copy">
                <span class="conversation-name">Agentic AI + Data Cloud</span>
                <span class="conversation-preview">LinkedIn post preview: agentic AI, Data Cloud, Salesforce.</span>
              </span>
              <span class="conversation-date">Post</span>
            </button>
            <button class="conversation-row linkedin-row" type="button" data-post-id="vibe-coding">
              <span class="conversation-avatar linkedin">in</span>
              <span class="conversation-copy">
                <span class="conversation-name">Vibe Coding</span>
                <span class="conversation-preview">LinkedIn post preview: vibe coding, building in public, AI.</span>
              </span>
              <span class="conversation-date">Post</span>
            </button>
          </section>
          <div class="search-bar" aria-hidden="true">
            <span>Search</span>
          </div>
        </section>

        <section class="messages-screen" aria-label="iMessage conversation">
          <div class="status-bar" aria-hidden="true">
            <span class="time-pill">8:11</span>
            <span class="system-icons">▮▮▮  Wi-Fi  ◖</span>
          </div>
          <header class="phone-header">
            <button class="back-pill" type="button" aria-label="Back">
              <span>‹</span>
              <strong>29</strong>
            </button>
            <div class="chat-title">
              <div class="group-avatar">M</div>
              <h1>Me</h1>
            </div>
            <button class="video-button" type="button" aria-label="Video call">
              <img src="/demo/assets/video-call-icon.png" alt="">
            </button>
          </header>

          <section id="thread" class="thread" aria-live="polite"></section>

          <div class="imessage-input">
            <button id="open-apps" class="plus-button" type="button" aria-label="Open iMessage apps">+</button>
            <div class="message-field">
              <span>iMessage</span>
              <button class="audio-button" type="button" aria-label="Audio message"></button>
            </div>
          </div>

          <section id="app-drawer" class="app-drawer" aria-label="iMessage apps" hidden>
            <button class="drawer-row" type="button">
              <span class="drawer-icon cash">$</span>
              <span>Apple Cash</span>
            </button>
            <button class="drawer-row" type="button">
              <span class="drawer-icon audio">▥</span>
              <span>Audio</span>
            </button>
            <button class="drawer-row" type="button">
              <span class="drawer-icon store">A</span>
              <span>Store</span>
            </button>
            <button id="open-scheduler" class="drawer-row" type="button">
              <span class="drawer-icon scheduler">▦</span>
              <span>Meeting Scheduler</span>
            </button>
            <button class="drawer-row" type="button">
              <span class="drawer-icon location">•</span>
              <span>Location</span>
            </button>
          </section>
        </section>

        <form id="demo-form" class="extension-sheet" hidden>
          <button id="close-sheet" class="grabber" type="button" aria-label="Close Meeting Scheduler"></button>
          <section class="extension-card" aria-label="iMessage app extension controls">
            <div class="extension-header">
              <div>
                <p class="extension-title">Meeting Scheduler</p>
                <p class="extension-subtitle">Hi Clely · early style</p>
              </div>
            </div>

            <div class="field-stack">
            <label>
              Meeting Title
              <input id="meeting-title" value="Portfolio Demo Meeting" required>
            </label>

              <fieldset class="duration-field">
                <legend>Duration</legend>
                <div class="duration-control">
                  <label>
                    <input type="radio" name="duration-minutes" value="30">
                    <span>30 min</span>
                  </label>
                  <label>
                    <input type="radio" name="duration-minutes" value="60" checked>
                    <span>60 min</span>
                  </label>
                  <label>
                    <input type="radio" name="duration-minutes" value="90">
                    <span>90 min</span>
                  </label>
                </div>
              </fieldset>

              <label>
                Invitee User IDs
                <span class="hint">Demo creates UUIDs automatically</span>
                <input id="invitee-user-ids" value="" placeholder="uuid1, uuid2..." readonly>
              </label>

              <div class="hidden-controls" aria-label="Demo agent preferences">
                <label>
                  Host style
                  <select id="host-style">
                    <option value="early" selected>Early</option>
                    <option value="balanced">Balanced</option>
                    <option value="flexible">Flexible</option>
                  </select>
                </label>
                <label>
                  Invitees
                  <select id="invitee-mix">
                    <option value="early-flexible" selected>Early + Flexible</option>
                    <option value="balanced-balanced">Balanced + Balanced</option>
                    <option value="early-balanced">Early + Balanced</option>
                  </select>
                </label>
              </div>
            </div>

          <div class="composer-actions">
            <button id="run-demo" type="submit">Run Demo Mode</button>
          </div>
          </section>
        </form>

        <aside id="guide-callout" class="guide-callout" aria-label="Current guided step">
          <p id="guide-step-count" class="guide-count">Step 1 of 5</p>
          <h3 id="guide-title">Open iMessage apps</h3>
          <p id="guide-copy">Tap the + button below to reveal the iMessage app drawer.</p>
          <button id="guide-next" class="guide-next" type="button">Tap + in the phone</button>
        </aside>
      </section>

    </main>

    <script src="/demo/app.js?v=20260629-focused-app"></script>
  </body>
</html>
